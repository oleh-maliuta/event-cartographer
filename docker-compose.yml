services:
  app:
    container_name: event-cartographer_app
    build:
      context: .
      dockerfile: event-cartographer.Server/Dockerfile
      args:
        BUILD_CONFIGURATION: Release
        APP_UID: 1000
    ports:
      - "8080:8080"
      - "8081:8081"
    env_file:
      - event-cartographer.Server/.env
    stdin_open: true
    tty: true
    depends_on:
      sqlserver:
        condition: service_healthy

  sqlserver:
    container_name: event-cartographer_sqlserver
    image: mcr.microsoft.com/mssql/server:2025-latest
    restart: unless-stopped
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=Password1
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "sqlserver", "-U", "sa", "-P", "Password1", "-C", "-Q", "SELECT 1", "-b", "-o", "/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  sqlserver_data:
